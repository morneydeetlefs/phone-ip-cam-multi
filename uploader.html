<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Cam Uploader – Setup & Run</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 15px;
      margin: 0;
    }
    h2 { margin: 10px 0 5px; }
    .setup-form {
      max-width: 500px;
      margin: 0 auto 20px;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      text-align: left;
    }
    input[type="text"], input[type="number"], input[type="url"] {
      width: 100%;
      padding: 10px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #444;
      box-sizing: border-box;
      background: #333;
      color: #eee;
    }
    button {
      padding: 12px 24px;
      font-size: 1.1em;
      margin: 20px 10px 10px;
      background: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #666; }
    #status {
      font-weight: bold;
      min-height: 1.5em;
      margin: 15px 0;
    }
    .success { color: #0f0; }
    .error   { color: #f44; }
    video, img {
      max-width: 90%;
      margin: 10px auto;
      display: block;
      border: 2px solid #444;
      border-radius: 8px;
      background: #000;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <h2>Phone → Camera Uploader</h2>

  <div id="setupSection" class="setup-form">
    <p>Fill in camera details once. First image uploads immediately after camera starts.</p>

    <label for="sheetUrl">Google Sheet URL (blank/new sheet):</label>
    <input type="url" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." required>

    <label for="cameraId">Camera ID (unique, e.g. cam-front-01):</label>
    <input type="text" id="cameraId" placeholder="cam-front-01" required>

    <label for="cameraName">Camera Name (display name):</label>
    <input type="text" id="cameraName" placeholder="Front Door" required>

    <label for="description">Description (optional):</label>
    <input type="text" id="description" placeholder="Main entrance, facing street">

    <label>Approximate Location (optional):</label>
    <div style="display:flex; gap:10px;">
      <input type="text" id="lat" placeholder="Latitude (-29.85)" style="flex:1;">
      <input type="text" id="lng" placeholder="Longitude (31.03)" style="flex:1;">
    </div>

    <label for="interval">Update every (seconds):</label>
    <input type="number" id="interval" value="30" min="10" max="300">

    <label for="maxImages">Keep last N images in tab:</label>
    <input type="number" id="maxImages" value="10" min="1" max="50">

    <button onclick="startCamera()">Save & Start Camera</button>
  </div>

  <p id="status" class="hidden">Initializing...</p>

  <video id="video" autoplay playsinline muted class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <img id="preview" alt="Latest snapshot" class="hidden">

  <!-- Hidden form + iframe for POST -->
  <form id="uploadForm" method="POST" target="hiddenIframe" class="hidden">
    <input type="hidden" name="jsonData" id="jsonDataField">
  </form>
  <iframe name="hiddenIframe" class="hidden" style="display:none;"></iframe>

  <script>
    const setupSection = document.getElementById('setupSection');
    const status       = document.getElementById('status');
    const videoEl      = document.getElementById('video');
    const canvasEl     = document.getElementById('canvas');
    const ctx          = canvasEl.getContext('2d');
    const previewEl    = document.getElementById('preview');

    let stream = null;
    let timer  = null;

    function startCamera() {
      const sheetUrl   = document.getElementById('sheetUrl').value.trim();
      const cameraId   = document.getElementById('cameraId').value.trim();
      const cameraName = document.getElementById('cameraName').value.trim();

      if (!sheetUrl || !cameraId || !cameraName) {
        status.textContent = 'Sheet URL, Camera ID and Name are required';
        status.className = 'error';
        status.classList.remove('hidden');
        return;
      }

      setupSection.classList.add('hidden');
      status.textContent = 'Starting camera...';
      status.className = '';
      status.classList.remove('hidden');
      videoEl.classList.remove('hidden');

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      })
      .then(s => {
        stream = s;
        videoEl.srcObject = stream;
        status.textContent = 'Camera ready – capturing first image...';
        captureAndSend(); // FIRST IMAGE IMMEDIATELY
        const intervalSec = parseInt(document.getElementById('interval').value) || 30;
        timer = setInterval(captureAndSend, intervalSec * 1000);
      })
      .catch(err => {
        status.textContent = 'Camera error: ' + err.message;
        status.className = 'error';
      });
    }

    function captureAndSend() {
      if (videoEl.videoWidth === 0) return;

      canvasEl.width = videoEl.videoWidth;
      canvasEl.height = videoEl.videoHeight;
      ctx.drawImage(videoEl, 0, 0);

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, canvasEl.height - 40, canvasEl.width, 40);
      ctx.fillStyle = '#fff';
      ctx.font = '16px Arial';
      ctx.fillText(new Date().toLocaleString(), 10, canvasEl.height - 15);

      const dataUrl = canvasEl.toDataURL('image/jpeg', 0.65);
      previewEl.src = dataUrl;
      previewEl.classList.remove('hidden');

      const payload = {
        sheetUrl:    document.getElementById('sheetUrl').value.trim(),
        cameraId:    document.getElementById('cameraId').value.trim(),
        cameraName:  document.getElementById('cameraName').value.trim(),
        description: document.getElementById('description').value.trim(),
        lat:         document.getElementById('lat').value.trim(),
        lng:         document.getElementById('lng').value.trim(),
        interval:    parseInt(document.getElementById('interval').value) || 30,
        maxImages:   parseInt(document.getElementById('maxImages').value) || 10,
        image:       dataUrl,
        width:       canvasEl.width,
        height:      canvasEl.height,
        userAgent:   navigator.userAgent,
        addedBy:     'morney'  // ← you can change this or make dynamic later
      };

      document.getElementById('jsonDataField').value = JSON.stringify(payload);
      document.getElementById('uploadForm').action = 'https://script.google.com/macros/s/YOUR_EXEC_URL_HERE/exec';
      document.getElementById('uploadForm').submit();

      status.textContent = `Sent → ${new Date().toLocaleTimeString()}`;
      status.className = 'success';
    }

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (timer) clearInterval(timer);
    });
  </script>
</body>
</html>
