<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Cam Uploader – Remember Settings</title>
  <link rel="icon" href="data:,">
  <style>
    body { font-family: sans-serif; background:#111; color:#eee; text-align:center; padding:15px; margin:0; }
    h2 { margin:10px 0 5px; }
    .setup-form { max-width:500px; margin:0 auto 20px; background:#222; padding:20px; border-radius:10px; }
    label { display:block; margin:10px 0 5px; text-align:left; }
    input[type="text"], input[type="number"], input[type="url"] {
      width:100%; padding:10px; font-size:1em; border-radius:6px; border:1px solid #444;
      box-sizing:border-box; background:#333; color:#eee;
    }
    button { padding:12px 24px; font-size:1.1em; margin:20px 10px 10px; background:#444; color:white;
      border:none; border-radius:6px; cursor:pointer; }
    button:hover { background:#666; }
    #status { font-weight:bold; min-height:1.5em; margin:15px 0; }
    .success { color:#0f0; }
    .error { color:#f44; }
    video, img { max-width:90%; margin:10px auto; display:block; border:2px solid #444; border-radius:8px; background:#000; }
    .hidden { display:none; }
  </style>
</head>
<body>

  <h2>Phone → Camera Uploader</h2>

  <div id="setupSection" class="setup-form">
    <p id="setupTitle">Setup Camera</p>

    <label for="sheetUrl">Google Sheet URL:</label>
    <input type="url" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." required>

    <label for="cameraId">Camera ID (unique):</label>
    <input type="text" id="cameraId" placeholder="cam-front-01" required>

    <label for="cameraName">Camera Name:</label>
    <input type="text" id="cameraName" placeholder="Front Door" required>

    <label for="description">Description (optional):</label>
    <input type="text" id="description" placeholder="Main entrance">

    <label>Approximate Location (optional):</label>
    <div style="display:flex; gap:10px;">
      <input type="text" id="lat" placeholder="Latitude" style="flex:1;">
      <input type="text" id="lng" placeholder="Longitude" style="flex:1;">
    </div>

    <label for="interval">Update every (seconds):</label>
    <input type="number" id="interval" value="30" min="10" max="300">

    <label for="maxImages">Keep last N images:</label>
    <input type="number" id="maxImages" value="10" min="1" max="50">

    <button id="startBtn" onclick="startOrResume()">Save & Start / Resume</button>
  </div>

  <p id="status" class="hidden">Initializing...</p>

  <video id="video" autoplay playsinline muted class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <img id="preview" alt="Latest snapshot" class="hidden">

  <form id="uploadForm" method="POST" target="hiddenIframe" class="hidden">
    <input type="hidden" name="jsonData" id="jsonDataField">
  </form>
  <iframe name="hiddenIframe" class="hidden" style="display:none;"></iframe>

  <script>
    const setupSection = document.getElementById('setupSection');
    const setupTitle    = document.getElementById('setupTitle');
    const startBtn      = document.getElementById('startBtn');
    const status        = document.getElementById('status');
    const videoEl       = document.getElementById('video');
    const canvasEl      = document.getElementById('canvas');
    const ctx           = canvasEl.getContext('2d');
    const previewEl     = document.getElementById('preview');

    let stream = null;
    let timer  = null;

    // Keys for localStorage
    const STORAGE_KEY = 'phoneCamSettings';

    // Load saved settings on page load
    window.addEventListener('load', () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const settings = JSON.parse(saved);
          document.getElementById('sheetUrl').value     = settings.sheetUrl    || '';
          document.getElementById('cameraId').value     = settings.cameraId    || '';
          document.getElementById('cameraName').value   = settings.cameraName  || '';
          document.getElementById('description').value  = settings.description || '';
          document.getElementById('lat').value          = settings.lat         || '';
          document.getElementById('lng').value          = settings.lng         || '';
          document.getElementById('interval').value     = settings.interval    || '30';
          document.getElementById('maxImages').value    = settings.maxImages   || '10';

          setupTitle.textContent = 'Resume with saved settings?';
          startBtn.textContent   = 'Resume Camera';
          status.textContent     = 'Settings loaded from previous session.';
          status.className       = 'success';
        } catch (e) {
          console.warn('Invalid saved settings', e);
        }
      }
    });

    function startOrResume() {
      const settings = {
        sheetUrl:    document.getElementById('sheetUrl').value.trim(),
        cameraId:    document.getElementById('cameraId').value.trim(),
        cameraName:  document.getElementById('cameraName').value.trim(),
        description: document.getElementById('description').value.trim(),
        lat:         document.getElementById('lat').value.trim(),
        lng:         document.getElementById('lng').value.trim(),
        interval:    parseInt(document.getElementById('interval').value) || 30,
        maxImages:   parseInt(document.getElementById('maxImages').value) || 10
      };

      if (!settings.sheetUrl || !settings.cameraId || !settings.cameraName) {
        status.textContent = 'Sheet URL, Camera ID and Name are required';
        status.className = 'error';
        return;
      }

      // Save settings locally
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));

      setupSection.classList.add('hidden');
      status.textContent = 'Starting camera...';
      status.className = '';
      videoEl.classList.remove('hidden');

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      })
      .then(s => {
        stream = s;
        videoEl.srcObject = stream;
        status.textContent = 'Camera ready – capturing first image now...';
        captureAndSend();  // FIRST IMAGE IMMEDIATELY
        timer = setInterval(captureAndSend, settings.interval * 1000);
      })
      .catch(err => {
        status.textContent = 'Camera error: ' + err.message;
        status.className = 'error';
      });
    }

    function captureAndSend() {
      if (videoEl.videoWidth === 0) return;

      canvasEl.width = videoEl.videoWidth;
      canvasEl.height = videoEl.videoHeight;
      ctx.drawImage(videoEl, 0, 0);

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, canvasEl.height - 40, canvasEl.width, 40);
      ctx.fillStyle = '#fff';
      ctx.font = '16px Arial';
      ctx.fillText(new Date().toLocaleString(), 10, canvasEl.height - 15);

      const dataUrl = canvasEl.toDataURL('image/jpeg', 0.65);
      previewEl.src = dataUrl;
      previewEl.classList.remove('hidden');

      const savedSettings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

      const payload = {
        sheetUrl:    savedSettings.sheetUrl,
        cameraId:    savedSettings.cameraId,
        cameraName:  savedSettings.cameraName,
        description: savedSettings.description,
        lat:         savedSettings.lat,
        lng:         savedSettings.lng,
        interval:    savedSettings.interval,
        maxImages:   savedSettings.maxImages,
        image:       dataUrl,
        width:       canvasEl.width,
        height:      canvasEl.height,
        userAgent:   navigator.userAgent,
        addedBy:     'morney'  // can make dynamic later
      };

      document.getElementById('jsonDataField').value = JSON.stringify(payload);
      document.getElementById('uploadForm').action = 'https://script.google.com/macros/s/AKfycbylZK6Qxn9bZJBvKYP_Fwv-WamJHphD3-DyuPq4AK9PPntixw3-CdYNmJyGlDtpmXhp/exec';
      document.getElementById('uploadForm').submit();

      status.textContent = `Sent → ${new Date().toLocaleTimeString()}`;
      status.className = 'success';
    }

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (timer) clearInterval(timer);
    });
  </script>
</body>
</html>
